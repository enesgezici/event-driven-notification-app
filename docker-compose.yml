version: '3.8'

services:
  notification-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SERVER_ADDRESS: ":8080"
      DATABASE_PATH: "/data/notifications.db"
      WEBHOOK_URL: ${WEBHOOK_URL}
    volumes:
      - notification_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  notification_data:
